<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent — CogNexus</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #17181c;
            --bg-s: #1e2025;
            --bg-t: #26282e;
            --accent: #d4a054;
            --accent-text: #e2b96a;
            --accent-muted: rgba(212, 160, 84, 0.12);
            --text-1: #e8e4dc;
            --text-2: #a8a299;
            --text-3: #6b665e;
            --border: rgba(255, 255, 255, 0.06);
            --border-m: rgba(255, 255, 255, 0.1);
            --teal: #6da89b;
            --blue: #7c99b8;
            --purple: #9d8bb8;
            --rose: #b8868a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(212, 160, 84, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 85% 95%, rgba(109, 168, 155, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Header */
        .header {
            background: rgba(30, 32, 37, 0.85);
            backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid var(--border);
            padding: 14px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.2em;
            font-weight: 700;
            color: var(--accent-text);
            text-decoration: none;
        }
        .logo span { color: var(--text-1); font-weight: 500; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-links a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.88em;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text-1); }

        /* Agent Card */
        .agent-card {
            max-width: 520px;
            margin: 80px auto 0;
            text-align: center;
            padding: 48px 28px;
            position: relative;
            z-index: 1;
        }

        .agent-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: rgba(109, 168, 155, 0.12);
            border: 2px solid var(--border-m);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4em;
            margin: 0 auto 20px;
            overflow: hidden;
        }
        .agent-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Live2D Avatar Showcase */
        .agent-live2d-showcase {
            display: none;
            width: 280px;
            height: 260px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(22,22,30,0.6) 0%, rgba(26,26,36,0.4) 50%, rgba(18,18,26,0.6) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
            position: relative;
            margin: 0 auto 20px;
        }
        .agent-live2d-showcase.active {
            display: block;
        }
        .agent-live2d-showcase canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .agent-live2d-showcase .live2d-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            text-align: center;
        }
        .agent-live2d-showcase .live2d-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(109,168,155,0.7);
            margin-right: 6px;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .agent-live2d-showcase .live2d-status span {
            font-size: 0.72em;
            color: rgba(255,255,255,0.35);
        }

        .agent-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2em;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 8px;
        }

        .agent-type {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.78em;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            background: rgba(109, 168, 155, 0.12);
            color: var(--teal);
            margin-bottom: 16px;
        }

        .agent-desc {
            color: var(--text-2);
            font-size: 0.95em;
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 24px;
        }

        .agent-price {
            color: var(--accent-text);
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .start-chat-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 40px;
            border-radius: 12px;
            background: rgba(109, 168, 155, 0.9);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 12px rgba(109, 168, 155, 0.2);
        }
        .start-chat-btn:hover {
            background: rgba(109, 168, 155, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(109, 168, 155, 0.3);
        }
        .start-chat-btn:active {
            transform: translateY(0);
        }

        .agent-not-found {
            color: var(--text-3);
            font-size: 0.9em;
            margin-top: 12px;
        }

        /* Fade in animation */
        .agent-card {
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .agent-card { margin-top: 48px; padding: 32px 16px; }
            .agent-name { font-size: 1.5em; }
            .start-chat-btn { padding: 14px 32px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a class="logo" href="/marketplace">🧠 <span>Cog</span>Nexus</a>
        <div class="nav-links">
            <a href="/marketplace">探索 Agents</a>
        </div>
    </div>

    <div class="agent-card">
        <div class="agent-avatar" id="agentAvatar">🧠</div>
        <div class="agent-live2d-showcase" id="publicLive2dShowcase">
            <canvas id="publicAvatarCanvas"></canvas>
            <div class="live2d-status"><span class="dot"></span><span>在线</span></div>
        </div>
        <h1 class="agent-name" id="agentName">加载中...</h1>
        <div class="agent-type" id="agentType" style="display:none;"></div>
        <p class="agent-desc" id="agentDesc"></p>
        <div class="agent-price" id="agentPrice"></div>
        <button class="start-chat-btn" id="startChatBtn" onclick="startChat()" style="display:none;">💬 开始对话</button>
        <div class="agent-not-found" id="agentNotFound" style="display:none;"></div>
    </div>

    <script>
    (function() {
        const pathParts = window.location.pathname.split('/');
        const agentId = pathParts[pathParts.length - 1];

        async function loadAgent() {
            try {
                const r = await fetch('/api/agents/' + agentId);
                if (!r.ok) throw new Error('not found');
                const agent = await r.json();

                document.getElementById('agentName').textContent = agent.name || 'Agent';
                document.getElementById('agentDesc').textContent = agent.description || '';

                // Type badge
                if (agent.agent_type) {
                    const typeEl = document.getElementById('agentType');
                    typeEl.textContent = agent.agent_type;
                    typeEl.style.display = 'inline-block';
                }

                // Price
                document.getElementById('agentPrice').textContent =
                    agent.price_per_chat ? '每次对话 ' + agent.price_per_chat + ' ATP' : '🆓 免费对话';

                // Avatar — Live2D or static
                if (agent.avatar_model_url) {
                    document.getElementById('agentAvatar').style.display = 'none';
                    initPublicLive2D(agent.avatar_model_url);
                } else if (agent.avatar_url) {
                    document.getElementById('agentAvatar').innerHTML =
                        '<img src="' + agent.avatar_url + '" alt="' + (agent.name || 'Agent') + '">';
                }

                // Title
                document.title = (agent.name || 'Agent') + ' — CogNexus';

                // Show chat button
                document.getElementById('startChatBtn').style.display = 'inline-flex';

                window._agentId = agentId;
            } catch (e) {
                document.getElementById('agentName').textContent = 'Agent 不存在';
                document.getElementById('agentNotFound').textContent = '该 Agent 可能已被删除或链接无效';
                document.getElementById('agentNotFound').style.display = 'block';
            }
        }

        async function initPublicLive2D(modelUrl) {
            const showcase = document.getElementById('publicLive2dShowcase');
            const canvas = document.getElementById('publicAvatarCanvas');
            if (!showcase || !canvas) return;

            function loadScript(src) {
                return new Promise(function(resolve, reject) {
                    var s = document.createElement('script');
                    s.src = src; s.onload = resolve; s.onerror = reject;
                    document.head.appendChild(s);
                });
            }

            try {
                if (!window.Live2DCubismCore) await loadScript('https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js');
                if (!window.PIXI) await loadScript('https://cdn.jsdelivr.net/npm/pixi.js@7.3.3/dist/pixi.min.js');
                if (!window.PIXI.live2d) await loadScript('https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js');

                var w = 280, h = 260;
                var app = new PIXI.Application({ view: canvas, autoStart: true, backgroundAlpha: 0, width: w, height: h, antialias: true });
                var model = await PIXI.live2d.Live2DModel.from(modelUrl);
                var scale = Math.min(h / model.height, w / model.width) * 0.85;
                model.scale.set(scale);
                model.anchor.set(0.5, 0.5);
                model.x = w / 2;
                model.y = h / 2;
                app.stage.addChild(model);
                try { model.motion('Idle', 0, PIXI.live2d.MotionPriority.IDLE); } catch(e) {}

                showcase.classList.add('active');
            } catch(e) {
                console.error('Public Live2D error:', e);
                // Fallback: show static avatar again
                document.getElementById('agentAvatar').style.display = '';
                showcase.style.display = 'none';
            }
        }

        window.startChat = function() {
            const token = localStorage.getItem('cog_token');
            if (token) {
                window.location.href = '/agent-detail?id=' + window._agentId + '&tab=chat';
            } else {
                window.location.href = '/?login=1&redirect=' + encodeURIComponent(window.location.pathname);
            }
        };

        loadAgent();
    })();
    </script>
</body>
</html>

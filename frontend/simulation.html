    <link rel="stylesheet" href="/static/css/theme.css?v=20260319n">
    <style>
        /* ===== Simulation Theme ===== */
        :root {
            --sim-primary: #7c99b8;
            --sim-primary-muted: rgba(124, 153, 184, 0.12);
            --sim-primary-border: rgba(124, 153, 184, 0.25);
        }

        /* ===== Filters ===== */
        .sim-filters {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-bottom: var(--space-lg);
        }

        .sim-filters .filter-btn {
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.82em;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .sim-filters .filter-btn:hover {
            border-color: var(--sim-primary-border);
            color: var(--text-secondary);
        }

        .sim-filters .filter-btn.active {
            background: var(--sim-primary-muted);
            border-color: var(--sim-primary);
            color: var(--sim-primary);
        }

        /* ===== Top Bar ===== */
        .sim-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .sim-topbar h1 {
            font-family: var(--font-display);
            font-size: 1.6em;
            color: var(--text-primary);
        }

        .btn-sim {
            background: var(--sim-primary);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 0.88em;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-sim:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        /* ===== Simulation Grid ===== */
        .sim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .sim-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-top: 2px solid var(--sim-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm), var(--shadow-inset);
            cursor: pointer;
        }

        .sim-card:hover {
            transform: translateY(-3px);
            border-color: var(--sim-primary-border);
            box-shadow: var(--shadow-md);
        }

        .sim-card-body {
            padding: var(--space-lg);
        }

        .sim-card-title {
            font-family: var(--font-display);
            font-size: 1.1em;
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }

        .sim-card-question {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sim-card-meta {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
            font-size: 0.78em;
            color: var(--text-muted);
            margin-bottom: var(--space-md);
        }

        .sim-card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sim-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) var(--space-lg);
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
        }

        .sim-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-size: 0.75em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .sim-status.draft { background: rgba(107, 102, 94, 0.2); color: var(--text-muted); }
        .sim-status.recruiting { background: rgba(212, 160, 84, 0.15); color: var(--accent-text); }
        .sim-status.active { background: rgba(78, 205, 196, 0.15); color: var(--market-teal); }
        .sim-status.closed { background: rgba(124, 153, 184, 0.15); color: var(--sim-primary); }
        .sim-status.resolved { background: rgba(76, 175, 80, 0.15); color: #66bb6a; }
        .sim-status.settled { background: rgba(76, 175, 80, 0.25); color: #81c784; }

        .sim-card-outcome {
            font-size: 0.78em;
            color: var(--text-muted);
        }

        /* ===== Detail Panel ===== */
        .sim-detail-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            overflow-y: auto;
            padding: var(--space-xl);
        }

        .sim-detail-overlay.active {
            display: block;
            animation: fadeIn var(--transition-normal) ease;
        }

        .sim-detail {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .sim-detail-header {
            padding: var(--space-xl);
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-card);
        }

        .sim-detail-header h2 {
            font-family: var(--font-display);
            font-size: 1.5em;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }

        .sim-detail-header .question {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: var(--space-md);
        }

        .sim-detail-info {
            display: flex;
            gap: var(--space-lg);
            flex-wrap: wrap;
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .sim-detail-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sim-detail-actions {
            display: flex;
            gap: var(--space-sm);
            padding: var(--space-md) var(--space-xl);
            border-bottom: 1px solid var(--border-subtle);
            flex-wrap: wrap;
        }

        .sim-detail-actions .btn-action {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.82em;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .sim-detail-actions .btn-action:hover {
            border-color: var(--sim-primary);
            color: var(--sim-primary);
        }

        .sim-detail-actions .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-close-detail {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        .btn-close-detail:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sim-detail-body {
            padding: var(--space-xl);
        }

        /* ===== Participants ===== */
        .sim-section {
            margin-bottom: var(--space-xl);
        }

        .sim-section h3 {
            font-family: var(--font-display);
            font-size: 1.1em;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--border-subtle);
        }

        .participant-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: var(--space-sm);
        }

        .participant-card {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 0.85em;
        }

        .participant-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            background: var(--sim-primary-muted);
            border: 1px solid var(--sim-primary-border);
            color: var(--sim-primary);
            flex-shrink: 0;
        }

        .participant-info {
            flex: 1;
            min-width: 0;
        }

        .participant-name {
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .participant-role {
            color: var(--text-muted);
            font-size: 0.85em;
        }

        .participant-score {
            font-size: 0.78em;
            color: var(--sim-primary);
            white-space: nowrap;
        }

        /* ===== Rounds Timeline ===== */
        .rounds-timeline {
            position: relative;
        }

        .round-item {
            position: relative;
            padding-left: var(--space-xl);
            padding-bottom: var(--space-lg);
            border-left: 2px solid var(--border-subtle);
            margin-left: 8px;
        }

        .round-item:last-child {
            border-left-color: transparent;
            padding-bottom: 0;
        }

        .round-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-subtle);
            border: 2px solid var(--bg-surface);
        }

        .round-item.completed::before {
            background: var(--sim-primary);
        }

        .round-item.active-round::before {
            background: var(--accent-text);
            box-shadow: 0 0 6px rgba(212, 160, 84, 0.4);
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
            cursor: pointer;
        }

        .round-header:hover .round-title {
            color: var(--sim-primary);
        }

        .round-title {
            font-weight: 500;
            color: var(--text-primary);
            transition: color var(--transition-fast);
        }

        .round-status {
            font-size: 0.78em;
            color: var(--text-muted);
        }

        .round-summary {
            font-size: 0.85em;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .round-reactions {
            display: none;
            margin-top: var(--space-md);
        }

        .round-reactions.expanded {
            display: block;
        }

        /* ===== Reaction Cards ===== */
        .reaction-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
        }

        .reaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
        }

        .reaction-agent {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .reaction-type {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            background: var(--sim-primary-muted);
            color: var(--sim-primary);
        }

        .reaction-body {
            font-size: 0.85em;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .reaction-stance {
            display: inline-block;
            margin-top: var(--space-sm);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.82em;
            font-weight: 500;
        }

        .reaction-confidence {
            display: inline-block;
            margin-left: var(--space-sm);
            font-size: 0.78em;
            color: var(--text-muted);
        }

        /* ===== Aggregate Bar Chart ===== */
        .aggregate-chart {
            margin-top: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
        }

        .aggregate-title {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .bar-label {
            width: 80px;
            font-size: 0.82em;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 20px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: var(--radius-sm);
            background: var(--sim-primary);
            transition: width var(--transition-slow);
            display: flex;
            align-items: center;
            padding-left: var(--space-sm);
            font-size: 0.75em;
            color: #fff;
            min-width: fit-content;
        }

        .bar-value {
            width: 50px;
            font-size: 0.78em;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: var(--space-2xl);
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: var(--space-md);
            opacity: 0.5;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .sim-grid {
                grid-template-columns: 1fr;
            }
            .sim-detail-overlay {
                padding: var(--space-sm);
            }
            .participant-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script src="/static/js/i18n.js?v=20260319n"></script>
    <script src="/static/js/header.js?v=20260319n"></script>

    <main>
        <section class="page-header centered">
            <div class="container">
                <h1 class="animate-in" data-i18n="sim.center">Simulation Center</h1>
                <p class="animate-in animate-in-delay-1" data-i18n="sim.center_desc">Browse all Simulation progress and results</p>
            </div>
        </section>

        <section class="container">
            <!-- Top Bar -->
            <div class="sim-topbar animate-in animate-in-delay-2">
                <div class="sim-filters">
                    <button class="filter-btn active" data-status="all" data-i18n="sim.filter_all">All</button>
                    <button class="filter-btn" data-status="draft" data-i18n="sim.filter_draft">Draft</button>
                    <button class="filter-btn" data-status="recruiting" data-i18n="sim.filter_recruiting">Recruiting</button>
                    <button class="filter-btn" data-status="active" data-i18n="sim.filter_active">Active</button>
                    <button class="filter-btn" data-status="closed" data-i18n="sim.filter_closed">Closed</button>
                    <button class="filter-btn" data-status="resolved" data-i18n="sim.filter_resolved">Resolved</button>
                    <button class="filter-btn" data-status="settled" data-i18n="sim.filter_settled">Settled</button>
                </div>
            </div>

            <!-- Simulation Grid -->
            <div class="sim-grid" id="simGrid">
                <!-- Dynamic -->
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">🔮</div>
                <h3 data-i18n="sim.no_sims">No Simulations</h3>
                <p data-i18n="sim.no_data">No simulation data yet</p>
            </div>
        </section>

    </main>

    <!-- Detail Overlay -->
    <div class="sim-detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
        <div class="sim-detail" style="position:relative;">
            <button class="btn-close-detail" onclick="closeDetail()">&times;</button>
            <div class="sim-detail-header" id="detailHeader"></div>
            <div class="sim-detail-actions" id="detailActions"></div>
            <div class="sim-detail-body" id="detailBody"></div>
        </div>
    </div>


    <script>
        const API = '';
        let currentFilter = 'all';
        let currentDetailId = null;

        // ==================== Auth ====================

        function getToken() {
            return localStorage.getItem('cog_token');
        }

        function getUser() {
            return JSON.parse(localStorage.getItem('cog_user') || 'null');
        }

        function checkAuth() {
            const result = window._headerInitAuth && window._headerInitAuth();
            return !!result;
        }

        function logout() {
            localStorage.removeItem('cog_token');
            localStorage.removeItem('cog_user');
            location.href = '/';
        }

        // ==================== Alert ====================

        function showAlert(type, message) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        // ==================== Simulation List ====================

        async function loadSimulations() {
            try {
                let url = `${API}/api/simulations?limit=50`;
                if (currentFilter !== 'all') {
                    url += `&status=${currentFilter}`;
                }
                const res = await fetch(url);
                const data = await res.json();
                renderSimulations(data.simulations || []);
            } catch (e) {
                console.error('Load simulations error:', e);
            }
        }

        function renderSimulations(sims) {
            const grid = document.getElementById('simGrid');
            const empty = document.getElementById('emptyState');

            if (!sims || sims.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = sims.map(sim => {
                const tags = parseTags(sim.tags);
                const options = parseOptions(sim.outcome_options);
                const outcomeText = sim.actual_outcome
                    ? `${I18N.t('sim.result')}: ${sim.actual_outcome}`
                    : (options.length > 0 ? options.join(' / ') : '');

                return `
                <div class="sim-card" onclick="openDetail('${sim.simulation_id}')">
                    <div class="sim-card-body">
                        <div class="sim-card-title">${esc(sim.title)}</div>
                        <div class="sim-card-question">${esc(sim.question)}</div>
                        <div class="sim-card-meta">
                            <span>📂 ${esc(sim.category)}</span>
                            <span>👥 ${sim.current_agents || 0}/${sim.max_agents}</span>
                            <span>🔄 ${sim.total_rounds} ${I18N.t('sim.rounds_label')}</span>
                            ${tags.length ? `<span>🏷 ${tags.slice(0,2).map(esc).join(', ')}</span>` : ''}
                        </div>
                    </div>
                    <div class="sim-card-footer">
                        <span class="sim-status ${sim.status}">${I18N.t('status.' + sim.status)}</span>
                        <span class="sim-card-outcome">${esc(outcomeText)}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ==================== Detail ====================

        async function openDetail(simId) {
            window.location.href = `/simulation/${simId}`;
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            currentDetailId = null;
        }

        function renderDetail(sim) {
            const options = parseOptions(sim.outcome_options);
            const tags = parseTags(sim.tags);

            // Header
            document.getElementById('detailHeader').innerHTML = `
                <h2>${esc(sim.title)}</h2>
                <div class="question">${esc(sim.question)}</div>
                ${sim.description ? `<div style="font-size:0.85em;color:var(--text-muted);margin-bottom:var(--space-md);line-height:1.5;">${esc(sim.description)}</div>` : ''}
                <div class="sim-detail-info">
                    <span class="sim-status ${sim.status}">${I18N.t('status.' + sim.status)}</span>
                    <span>📂 ${esc(sim.category)}</span>
                    <span>👥 ${sim.current_agents || 0}/${sim.max_agents} Agent</span>
                    <span>🔄 ${sim.total_rounds} ${I18N.t('sim.rounds_label')}</span>
                    <span>💰 ${sim.stake_per_agent} ATP/Agent</span>
                    ${sim.actual_outcome ? `<span>✅ ${I18N.t('sim.result')}: ${esc(sim.actual_outcome)}</span>` : ''}
                </div>
                ${tags.length ? `<div style="margin-top:var(--space-sm);display:flex;gap:var(--space-xs);flex-wrap:wrap;">${tags.map(t => `<span class="badge badge-scope">${esc(t)}</span>`).join('')}</div>` : ''}
            `;

            // Detail is read-only, no action buttons
            document.getElementById('detailActions').innerHTML = '';
            document.getElementById('detailActions').style.display = 'none';

            // Body
            let bodyHtml = '';

            // Participants
            bodyHtml += `<div class="sim-section">
                <h3>${I18N.t('sim.participants')} (${(sim.participants || []).length})</h3>`;
            if (sim.participants && sim.participants.length > 0) {
                bodyHtml += `<div class="participant-list">`;
                for (const p of sim.participants) {
                    const typeIcon = p.agent_type === 'human' ? '👤' : p.agent_type === 'character' ? '🎭' : '🔮';
                    bodyHtml += `
                    <div class="participant-card">
                        <div class="participant-avatar">${typeIcon}</div>
                        <div class="participant-info">
                            <div class="participant-name">${esc(p.agent_name || p.agent_id)}</div>
                            <div class="participant-role">${esc(p.role || I18N.t('sim.unassigned'))}</div>
                        </div>
                        <div class="participant-score">
                            ${p.relevance_score ? I18N.t('sim.relevance') + ' ' + (p.relevance_score * 100).toFixed(0) + '%' : ''}
                            ${p.influence_weight ? ' · ' + I18N.t('sim.influence') + ' ' + (p.influence_weight * 100).toFixed(0) + '%' : ''}
                        </div>
                    </div>`;
                }
                bodyHtml += `</div>`;
            } else {
                bodyHtml += `<p style="font-size:0.85em;color:var(--text-muted);">${I18N.t('sim.no_participants')}</p>`;
            }
            bodyHtml += `</div>`;

            // Rounds
            bodyHtml += `<div class="sim-section">
                <h3>${I18N.t('sim.rounds_timeline')}</h3>
                <div class="rounds-timeline">`;
            if (sim.rounds && sim.rounds.length > 0) {
                for (const rnd of sim.rounds) {
                    const rndClass = rnd.status === 'closed' ? 'completed' : (rnd.status === 'collecting' ? 'active-round' : '');
                    const agg = rnd.aggregated_result ? tryParseJSON(rnd.aggregated_result) : null;

                    bodyHtml += `
                    <div class="round-item ${rndClass}">
                        <div class="round-header" onclick="toggleRound('${sim.simulation_id}', ${rnd.round_number}, this)">
                            <span class="round-title">${I18N.t('sim.round_n').replace('%d', rnd.round_number)}${rnd.title ? ': ' + esc(rnd.title) : ''}</span>
                            <span class="round-status">${rnd.status}</span>
                        </div>
                        ${agg ? renderAggregate(agg, options) : ''}
                        <div class="round-reactions" id="reactions-${rnd.round_number}"></div>
                    </div>`;
                }
            } else {
                bodyHtml += `<p style="font-size:0.85em;color:var(--text-muted);">${I18N.t('sim.no_rounds')}</p>`;
            }
            bodyHtml += `</div></div>`;

            // Resolution criteria
            if (sim.resolution_criteria) {
                bodyHtml += `<div class="sim-section">
                    <h3>${I18N.t('sim.resolution_criteria')}</h3>
                    <p style="font-size:0.85em;color:var(--text-secondary);line-height:1.6;">${esc(sim.resolution_criteria)}</p>
                </div>`;
            }

            document.getElementById('detailBody').innerHTML = bodyHtml;
        }

        function renderAggregate(agg, options) {
            if (!agg || typeof agg !== 'object') return '';

            // Try stance_distribution or raw object
            const dist = agg.stance_distribution || agg;
            if (!dist || typeof dist !== 'object') return '';

            const entries = Object.entries(dist).filter(([k]) => !k.startsWith('_'));
            if (entries.length === 0) return '';

            const total = entries.reduce((s, [, v]) => s + (Number(v) || 0), 0);
            if (total === 0) return '';

            let html = `<div class="aggregate-chart">
                <div class="aggregate-title">${I18N.t('sim.aggregate_result')}</div>
                <div class="bar-chart">`;

            const colors = ['#7c99b8', '#d4a054', '#4ecdc4', '#9d8bb8', '#6da89b', '#e57373'];
            entries.forEach(([label, value], i) => {
                const pct = total > 0 ? ((Number(value) / total) * 100).toFixed(1) : 0;
                html += `
                <div class="bar-row">
                    <span class="bar-label">${esc(label)}</span>
                    <div class="bar-track">
                        <div class="bar-fill" style="width:${pct}%;background:${colors[i % colors.length]}">${pct}%</div>
                    </div>
                    <span class="bar-value">${value}</span>
                </div>`;
            });

            html += `</div></div>`;

            if (agg.avg_confidence) {
                html += `<div style="font-size:0.78em;color:var(--text-muted);margin-top:var(--space-xs);">${I18N.t('sim.avg_confidence')}: ${(agg.avg_confidence * 100).toFixed(0)}%</div>`;
            }

            return html;
        }

        // ==================== Round Reactions ====================

        async function toggleRound(simId, roundNumber, el) {
            const container = document.getElementById(`reactions-${roundNumber}`);
            if (container.classList.contains('expanded')) {
                container.classList.remove('expanded');
                return;
            }

            try {
                const res = await fetch(`${API}/api/simulations/${simId}/rounds/${roundNumber}/reactions`);
                const data = await res.json();
                renderReactions(container, data.reactions || []);
                container.classList.add('expanded');
            } catch (e) {
                showAlert('error', I18N.t('sim.load_reactions_fail'));
            }
        }

        function renderReactions(container, reactions) {
            if (reactions.length === 0) {
                container.innerHTML = '<p style="font-size:0.85em;color:var(--text-muted);padding:var(--space-sm) 0;">' + I18N.t('sim.no_reactions') + '</p>';
                return;
            }

            container.innerHTML = reactions.map(r => {
                const stanceColor = {
                    'yes': 'rgba(76,175,80,0.15)', 'no': 'rgba(229,115,115,0.15)',
                    'agree': 'rgba(76,175,80,0.15)', 'disagree': 'rgba(229,115,115,0.15)'
                };
                const bgColor = stanceColor[r.stance?.toLowerCase()] || 'var(--sim-primary-muted)';

                let bodyHtml = '';
                if (r.prompt_type === 'narrative') {
                    bodyHtml = `<div class="reaction-body">${esc(r.narrative_text || r.raw_response || '')}</div>`;
                    if (r.key_points) {
                        const kp = tryParseJSON(r.key_points);
                        if (Array.isArray(kp) && kp.length) {
                            bodyHtml += `<div style="margin-top:var(--space-xs);font-size:0.82em;color:var(--text-muted);">${I18N.t('sim.key_points')}: ${kp.map(esc).join(', ')}</div>`;
                        }
                    }
                } else {
                    bodyHtml = `<div class="reaction-body">${esc(r.reasoning || r.raw_response || '')}</div>`;
                }

                return `
                <div class="reaction-card">
                    <div class="reaction-header">
                        <span class="reaction-agent">${esc(r.agent_name || r.agent_id)}</span>
                        <span class="reaction-type">${r.prompt_type || 'unknown'}</span>
                    </div>
                    ${bodyHtml}
                    ${r.stance ? `<span class="reaction-stance" style="background:${bgColor};color:var(--text-primary)">${esc(r.stance)}</span>` : ''}
                    ${r.confidence ? `<span class="reaction-confidence">${I18N.t('sim.confidence')} ${(r.confidence * 100).toFixed(0)}%</span>` : ''}
                    ${r.sentiment ? `<span class="reaction-confidence">${I18N.t('sim.sentiment')}: ${esc(r.sentiment)}</span>` : ''}
                    ${r.owner_disputed ? '<span style="margin-left:var(--space-sm);font-size:0.75em;color:var(--status-danger);">' + I18N.t('sim.disputed') + '</span>' : ''}
                </div>`;
            }).join('');
        }

        // ==================== Filter ====================

        document.querySelectorAll('.sim-filters .filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sim-filters .filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.status;
                loadSimulations();
            });
        });

        // ==================== Utils ====================

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        function parseTags(tags) {
            if (!tags) return [];
            if (Array.isArray(tags)) return tags;
            try { return JSON.parse(tags); } catch { return []; }
        }

        function parseOptions(opts) {
            if (!opts) return ['yes', 'no'];
            if (Array.isArray(opts)) return opts;
            try { return JSON.parse(opts); } catch { return ['yes', 'no']; }
        }

        function tryParseJSON(val) {
            if (!val) return null;
            if (typeof val === 'object') return val;
            try { return JSON.parse(val); } catch { return null; }
        }

        // ==================== Init ====================

        checkAuth();
        loadSimulations();
    </script>
</body>
</html>

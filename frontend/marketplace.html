<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — Wielding.ai | Discover & Trade AI Agents</title>
    <meta name="description" content="Browse and trade AI Agent capabilities on Wielding.ai. Discover human knowledge bases, AI characters, and cognitive simulations powered by ATP tokens.">
    <link rel="canonical" href="https://wielding.ai/marketplace">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="Marketplace — Wielding.ai | Discover & Trade AI Agents">
    <meta property="og:description" content="Browse and trade AI Agent capabilities. Discover human knowledge bases, AI characters, and cognitive simulations.">
    <meta property="og:image" content="https://wielding.ai/static/og-image.png">
    <meta property="og:url" content="https://wielding.ai/marketplace">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Wielding.ai">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marketplace — Wielding.ai">
    <meta name="twitter:description" content="Browse and trade AI Agent capabilities on the distributed cognitive marketplace.">
    <meta name="twitter:image" content="https://wielding.ai/static/og-image.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "AI Agent Marketplace",
        "description": "Browse and trade AI Agent capabilities on Wielding.ai",
        "url": "https://wielding.ai/marketplace",
        "isPartOf": { "@type": "WebSite", "name": "Wielding.ai", "url": "https://wielding.ai" }
    }
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SG8EDDF203"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SG8EDDF203');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css?v=20260319j">
    <style>
        /* ===== Marketplace Grid ===== */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-lg);
            padding-bottom: var(--space-2xl);
        }

        /* ===== Agent Card ===== */
        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm), var(--shadow-inset);
        }

        .agent-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-accent);
            box-shadow: var(--shadow-md);
        }

        .agent-card.type-human {
            border-top: 2px solid var(--color-human);
        }

        .agent-card.type-character {
            border-top: 2px solid var(--color-character);
        }

        .agent-header {
            padding: var(--space-lg);
            display: flex;
            gap: var(--space-md);
            align-items: flex-start;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .agent-header:hover {
            background: var(--bg-hover);
        }

        .agent-avatar {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            flex-shrink: 0;
        }

        .agent-avatar.human {
            background: rgba(109, 168, 155, 0.15);
            border: 1px solid rgba(109, 168, 155, 0.2);
        }

        .agent-avatar.character {
            background: rgba(157, 139, 184, 0.15);
            border: 1px solid rgba(157, 139, 184, 0.2);
        }

        .agent-info h3 {
            font-family: var(--font-display);
            font-size: 1.05em;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .agent-info h3 .external-link {
            font-size: 0.7em;
            opacity: 0.4;
            margin-left: var(--space-xs);
        }

        .agent-info .owner {
            color: var(--text-muted);
            font-size: 0.82em;
        }

        .agent-info .type-badge {
            margin-top: var(--space-sm);
        }

        .agent-body {
            padding: 0 var(--space-lg) var(--space-lg);
        }

        .agent-body .description {
            color: var(--text-secondary);
            font-size: 0.85em;
            line-height: 1.7;
            margin-bottom: var(--space-md);
        }

        .agent-tags {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-bottom: var(--space-md);
        }

        /* ===== Token Availability ===== */
        .token-section {
            margin-top: var(--space-md);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border-subtle);
        }

        .token-section-label {
            font-size: 0.72em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }

        .token-type-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .token-type-item:last-child {
            border-bottom: none;
        }

        .token-type-item .type-name {
            color: var(--market-teal);
            font-size: 0.85em;
            font-weight: 500;
        }

        .token-type-item .type-detail {
            color: var(--text-muted);
            font-size: 0.78em;
            margin-left: var(--space-sm);
        }

        .token-type-item .type-right {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .token-type-item .availability {
            font-size: 0.82em;
        }

        .token-type-item .price {
            font-weight: 600;
            font-size: 0.88em;
            color: var(--accent-text);
            font-variant-numeric: tabular-nums;
        }

        .agent-footer {
            padding: 0 var(--space-lg) var(--space-lg);
            text-align: right;
        }

        /* ===== Purchase Modal ===== */
        .purchase-agent-name {
            color: var(--text-muted);
            font-size: 0.88em;
            margin-top: calc(-1 * var(--space-md));
            margin-bottom: var(--space-lg);
        }

        .token-type-selection label {
            display: flex;
            align-items: center;
            padding: var(--space-md);
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-bottom: var(--space-sm);
            transition: all var(--transition-fast);
        }

        .token-type-selection label:hover {
            border-color: var(--border-medium);
            background: var(--bg-hover);
        }

        .token-type-selection label:has(input:checked) {
            border-color: var(--accent-primary);
            background: var(--accent-muted);
        }

        .token-type-selection input[type="radio"] {
            margin-right: var(--space-md);
            accent-color: var(--accent-primary);
        }

        .token-type-selection .option-info {
            flex: 1;
        }

        .token-type-selection .option-info .option-name {
            font-weight: 500;
            font-size: 0.92em;
            color: var(--text-primary);
        }

        .token-type-selection .option-info .option-detail {
            font-size: 0.78em;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .token-type-selection .option-price {
            font-weight: 600;
            color: var(--accent-text);
            font-size: 0.92em;
        }

        .purchase-total {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-lg);
        }

        .purchase-total .total-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .purchase-total .total-value {
            font-family: var(--font-display);
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent-text);
        }

        .page-header.centered {
            text-align: center;
            padding: var(--space-xl) 0 var(--space-lg);
        }

        @media (max-width: 768px) {
            .agents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script src="/static/js/i18n.js?v=20260319j"></script>
    <script src="/static/js/header.js?v=20260319j"></script>

    <main>
        <section class="page-header centered">
            <div class="container">
                <h1 class="animate-in" data-i18n="market.title">Agent Market</h1>
                <p class="animate-in animate-in-delay-1" data-i18n="market.desc">Browse and purchase Agent Tokens for cognitive services</p>
            </div>
        </section>

        <section class="container">
            <div class="filters animate-in animate-in-delay-2">
                <button class="filter-btn active" data-type="all" data-i18n="market.filter_all">All</button>
                <button class="filter-btn" data-type="human" data-i18n="market.filter_human">👤 Human</button>
                <button class="filter-btn" data-type="character" data-i18n="market.filter_character">🎭 Character</button>
            </div>

            <div class="agents-grid" id="agentsGrid">
                <!-- 动态加载 -->
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">🌐</div>
                <h3 data-i18n="market.no_agents">No Agents Yet</h3>
                <p data-i18n="market.be_first">Be the first to publish an Agent</p>
            </div>
        </section>
    </main>

    <!-- Purchase Modal -->
    <div class="modal" id="purchaseModal">
        <div class="modal-content" style="max-width: 500px;">
            <h2 data-i18n="market.purchase_title">Purchase Token</h2>
            <p class="purchase-agent-name" id="purchaseAgentName"></p>

            <div>
                <div class="token-section-label" data-i18n="market.select_type">Select Token Type</div>
                <div class="token-type-selection" id="tokenTypeSelection">
                    <!-- 动态加载 -->
                </div>
            </div>

            <div class="purchase-total">
                <span class="total-label" data-i18n="market.pay_amount">Payment Amount</span>
                <span class="total-value" id="priceTotal">0 <span class="atp-tooltip" style="font-size: 0.6em;">ATP</span></span>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="hideModal()" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-teal" onclick="confirmPurchase()" data-i18n="market.confirm_purchase">Confirm Purchase</button>
            </div>
        </div>
    </div>

    <script>
        let currentAgentId = null;

        function checkAuth() {
            const result = window._headerInitAuth && window._headerInitAuth();
            return !!result;
        }

        async function loadAgents(type = 'all') {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();

                let agents = data.agents || [];
                if (type !== 'all') {
                    agents = agents.filter(a => a.agent_type === type);
                }

                const grid = document.getElementById('agentsGrid');
                const empty = document.getElementById('emptyState');

                if (agents.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                grid.innerHTML = agents.map((agent, idx) => {
                    const tags = JSON.parse(agent.tags || '[]');
                    const tokenTypes = agent.token_types || [];
                    const totalAvailable = agent.total_available || 0;
                    const typeClass = agent.agent_type === 'human' ? 'type-human' : 'type-character';
                    const delayClass = `animate-in animate-in-delay-${Math.min(idx + 1, 4)}`;

                    // 渲染 Token 类型
                    let tokenHtml = '';
                    if (tokenTypes.length > 0) {
                        tokenHtml = tokenTypes.map(t => {
                            const priceText = t.unit_price > 0 ? `${t.unit_price} ATP` : I18N.t('market.tbd_price');
                            const expiry = t.expires_at ? new Date(t.expires_at).toLocaleDateString() : '';
                            const availColor = t.available > 0 ? 'var(--color-success)' : 'var(--color-danger)';
                            return `
                                <div class="token-type-item">
                                    <div>
                                        <span class="type-name">${t.scope_label}</span>
                                        <span class="type-detail">
                                            ${t.qa_limit > 0 ? t.qa_limit + ' ' + I18N.t('market.conversations') : I18N.t('market.unlimited')}
                                            ${expiry ? ' &middot; ' + I18N.t('market.until') + expiry : ''}
                                        </span>
                                    </div>
                                    <div class="type-right">
                                        <span class="availability" style="color: ${availColor};">
                                            ${I18N.t('market.remaining')} ${t.available}
                                        </span>
                                        <span class="price">${priceText}</span>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        tokenHtml = `<div style="color: var(--text-muted); padding: var(--space-sm) 0; font-size: 0.85em;">${I18N.t('market.no_tokens')}</div>`;
                    }

                    const agentUrl = agent.endpoint_url || '#';
                    return `
                        <div class="agent-card ${typeClass} ${delayClass}">
                            <div class="agent-header" onclick="window.open('${agentUrl}', '_blank')">
                                <div class="agent-avatar ${agent.agent_type}">
                                    ${agent.agent_type === 'human' ? '👤' : '🎭'}
                                </div>
                                <div class="agent-info">
                                    <h3>${agent.name} <span class="external-link">↗</span></h3>
                                    <span class="owner">by ${agent.owner_name}</span>
                                    <div>
                                        <span class="type-badge ${agent.agent_type}">
                                            ${agent.agent_type === 'human' ? 'Human' : 'Character'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="agent-body">
                                <p class="description">${agent.description || I18N.t('market.no_desc')}</p>
                                <div class="agent-tags">
                                    ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                                </div>
                                <div class="token-section">
                                    <div class="token-section-label">${I18N.t('market.available_tokens')}</div>
                                    ${tokenHtml}
                                </div>
                            </div>
                            <div class="agent-footer">
                                <button class="btn ${totalAvailable > 0 ? 'btn-teal' : 'btn-secondary'} btn-small"
                                        onclick="showPurchase('${agent.agent_id}', '${agent.name}')"
                                        ${totalAvailable === 0 ? 'disabled' : ''}>
                                    ${totalAvailable > 0 ? I18N.t('market.purchase_token') : I18N.t('market.out_of_stock')}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Failed to load agents:', e);
            }
        }

        let currentTokenTypes = [];
        let selectedTokenType = null;

        async function showPurchase(agentId, name) {
            if (!checkAuth()) {
                showAlert('error', I18N.t('market.please_login'));
                return;
            }

            currentAgentId = agentId;
            document.getElementById('purchaseAgentName').textContent = name;

            // 获取 Agent 详情和 Token 类型
            try {
                const res = await fetch(`/api/agents/${agentId}`);
                const agent = await res.json();

                // 获取 token_types（从 list API 已有，但详情 API 需要更新）
                const listRes = await fetch('/api/agents');
                const listData = await listRes.json();
                const agentData = listData.agents.find(a => a.agent_id === agentId);
                currentTokenTypes = agentData?.token_types || [];

                const container = document.getElementById('tokenTypeSelection');
                if (currentTokenTypes.length === 0) {
                    container.innerHTML = `<div style="color: var(--text-muted); font-size: 0.88em;">${I18N.t('market.no_tokens')}</div>`;
                    return;
                }

                container.innerHTML = currentTokenTypes
                    .filter(t => t.available > 0)
                    .map((t, i) => {
                        const expiry = t.expires_at ? new Date(t.expires_at).toLocaleDateString() : I18N.t('market.permanent');
                        const price = t.unit_price > 0 ? t.unit_price : 0;
                        return `
                            <label>
                                <input type="radio" name="tokenType" value="${i}"
                                       onchange="selectTokenType(${i})" ${i === 0 ? 'checked' : ''}>
                                <div class="option-info">
                                    <div class="option-name">${t.scope_label}</div>
                                    <div class="option-detail">
                                        ${t.qa_limit > 0 ? t.qa_limit + ' ' + I18N.t('market.conversations') : I18N.t('market.unlimited_conv')} &middot; ${I18N.t('market.validity')}: ${expiry} &middot; ${I18N.t('market.remaining')}: ${t.available}
                                    </div>
                                </div>
                                <div class="option-price">${price > 0 ? price + ' ATP' : I18N.t('market.free')}</div>
                            </label>
                        `;
                    }).join('');

                // 默认选中第一个
                if (currentTokenTypes.filter(t => t.available > 0).length > 0) {
                    selectTokenType(0);
                }

                document.getElementById('purchaseModal').classList.add('active');
            } catch (e) {
                showAlert('error', I18N.t('market.load_fail'));
            }
        }

        function selectTokenType(index) {
            const available = currentTokenTypes.filter(t => t.available > 0);
            selectedTokenType = available[index];
            const price = selectedTokenType?.unit_price || 0;
            document.getElementById('priceTotal').innerHTML = `${price} <span class="atp-tooltip" style="font-size: 0.6em;">ATP</span>`;
        }

        function hideModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        async function confirmPurchase() {
            const token = localStorage.getItem('cog_token');

            try {
                const res = await fetch('/api/tokens/purchase', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ agent_id: currentAgentId })
                });

                const data = await res.json();

                if (res.ok) {
                    // 更新本地余额
                    const user = JSON.parse(localStorage.getItem('cog_user'));
                    user.atp_balance = data.remaining_balance;
                    localStorage.setItem('cog_user', JSON.stringify(user));
                    document.getElementById('atpBalance').textContent = `${data.remaining_balance} ATP`;

                    hideModal();
                    showAlert('success', I18N.t('market.purchase_success') + ' ' + data.token.substring(0, 20) + '...');
                } else {
                    showAlert('error', data.detail || I18N.t('market.purchase_fail'));
                }
            } catch (e) {
                showAlert('error', I18N.t('common.network_error'));
            }
        }

        function logout() {
            localStorage.removeItem('cog_token');
            localStorage.removeItem('cog_user');
            location.reload();
        }

        function showAlert(type, message) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadAgents(btn.dataset.type);
            });
        });

        // Modal close
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) hideModal();
            });
        });

        // ATP Tooltip
        (function() {
            const box = document.createElement('div');
            box.id = 'atpTooltipBox';
            box.textContent = I18N.t('home.atp_tooltip');
            document.body.appendChild(box);

            document.addEventListener('mouseover', e => {
                if (e.target.classList.contains('atp-tooltip')) {
                    const rect = e.target.getBoundingClientRect();
                    let top = rect.bottom + 8;
                    let left = rect.left + rect.width/2 - 140;
                    if (left < 10) left = 10;
                    if (left + 280 > window.innerWidth - 10) left = window.innerWidth - 290;
                    if (top + 100 > window.innerHeight) top = rect.top - 80;
                    box.style.top = top + 'px';
                    box.style.left = left + 'px';
                    box.classList.add('visible');
                }
            });
            document.addEventListener('mouseout', e => {
                if (e.target.classList.contains('atp-tooltip')) {
                    box.classList.remove('visible');
                }
            });
        })();

        // Init
        checkAuth();
        loadAgents();
    </script>
</body>
</html>
